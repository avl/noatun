name: Miri

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "37 7 * * 1"
env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install nightly
      run: rustup toolchain install nightly
    - name: Miri (nightly)
      run: rustup component add --toolchain nightly miri
    - name: Run miri
      run: cargo +nightly miri test miri
