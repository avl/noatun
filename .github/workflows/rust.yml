name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "37 7 * * 1"
env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install rust
      run: rustup toolchain install stable && rustup toolchain install 1.86
    - name: Install nextest
      run: cargo install cargo-nextest
    - name: Run bench
      run: cd db_bench && cargo +stable run --release
    - name: Build examples
      run: cargo build --examples
    - name: Run tests
      run: cargo +stable nextest run --workspace
    - name: Miri
      run: rustup component add --toolchain nightly miri && cargo +nightly miri test miri
    - name: Docs
      run: cargo +stable test --doc
    - name: Build (1.86)
      run: cargo +1.86 build --workspace --all-targets --all-features




