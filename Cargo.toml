[package]
name = "noatun"
version = "0.1.0"
edition = "2024"
resolver = "2"

# The `foo` package will use the -Copt-level=3 flag.
[profile.dev.package.sha2]
opt-level = 3
[profile.dev.package.bytemuck]
opt-level = 3
[profile.dev.package.byteorder]
opt-level = 3

[features]
savefile = ["dep:savefile",  "savefile-derive"]

[dependencies]
byteorder = "1.5"
bytemuck = { version = "1.20", features = ["derive"] }
sha2 = "0.10"
indexmap = "2.7"
bumpalo = "3.16"
time = { version = "0.3", features = ["formatting"] }
memmap2 = {version ="0.9"}
anyhow = "1.0"
fs2 = "0.4"
savefile = {  version = "0.18", optional = true }
savefile-derive = { version = "0.18", optional = true }
serde_derive = "1.0"
serde = "1.0"
libc = "0.2.169"

[dev-dependencies]
savefile="0.18"
savefile-derive = "0.18"
noatun = { path = ".", features = ["savefile"] }